# L7/DNS-aware egress: allow outbound traffic by DOMAIN NAME, not IP.
# For SaaS APIs behind CDNs the IPs rotate constantly — an ipBlock allowlist
# rots in days; an FQDN allowlist does not.
#
# Requires a CNI with FQDN support (open-source Cilium; on GKE Dataplane V2
# use the equivalent FQDNNetworkPolicy CRD). Scoped opt-in by label, layered
# on top of the same default-deny baseline.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-fqdn-allowlist
  namespace: production
spec:
  endpointSelector:
    matchLabels:
      egress-fqdn: "true" # opt-in by label
  egress:
    # DNS goes through the Cilium DNS proxy so toFQDNs can observe lookups.
    # matchPattern "*" grants VISIBILITY of queries, not connectivity.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    # The actual allowlist — TLS only.
    - toFQDNs:
        - matchPattern: "*.googleapis.com" # GCP APIs (Secret Manager, GCS, ...)
        - matchName: accounts.google.com # OAuth token exchange
        - matchName: api.xendit.co # payment gateway (example third party)
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
