# Anti-bypass: the frontend must only be reachable THROUGH Cloudflare.
# Anyone who discovers the origin/load-balancer IP and connects directly is
# dropped — WAF and DDoS protection cannot be skipped.
#
# All source ranges share one rule entry (one `from` list, one `ports` list):
# 16 copy-pasted single-CIDR rules collapse into a policy you can actually review.
#
# Sources: https://www.cloudflare.com/ips-v4 (review on a schedule — these
# change rarely, but they do change) + GCP load-balancer health checkers.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-ingress-cloudflare-only
  namespace: production
spec:
  podSelector:
    matchLabels:
      role: frontend # opt-in by label, never the whole namespace
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Cloudflare IPv4 ranges
        - ipBlock: { cidr: 173.245.48.0/20 }
        - ipBlock: { cidr: 103.21.244.0/22 }
        - ipBlock: { cidr: 103.22.200.0/22 }
        - ipBlock: { cidr: 103.31.4.0/22 }
        - ipBlock: { cidr: 141.101.64.0/18 }
        - ipBlock: { cidr: 108.162.192.0/18 }
        - ipBlock: { cidr: 190.93.240.0/20 }
        - ipBlock: { cidr: 188.114.96.0/20 }
        - ipBlock: { cidr: 197.234.240.0/22 }
        - ipBlock: { cidr: 198.41.128.0/17 }
        - ipBlock: { cidr: 162.158.0.0/15 }
        - ipBlock: { cidr: 104.16.0.0/13 }
        - ipBlock: { cidr: 104.24.0.0/14 }
        - ipBlock: { cidr: 172.64.0.0/13 }
        - ipBlock: { cidr: 131.0.72.0/22 }
        # GCP load-balancer health checks (GKE Ingress/Gateway backends)
        - ipBlock: { cidr: 35.191.0.0/16 }
        - ipBlock: { cidr: 130.211.0.0/22 }
      ports:
        # TLS only — Cloudflare→origin should run Full (strict); port 80 to the
        # origin is an invitation to downgrade. Redirect http→https at the edge.
        - port: 443
          protocol: TCP
