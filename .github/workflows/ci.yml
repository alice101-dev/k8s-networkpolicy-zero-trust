name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  kubeconform:
    name: Manifest schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      # -ignore-missing-schemas: FQDNNetworkPolicy (networking.gke.io) is a CRD without a public JSON schema
      - name: kubeconform
        run: kubeconform -strict -summary -ignore-missing-schemas ./*.yaml

  checkov:
    name: Checkov security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d . --framework kubernetes
